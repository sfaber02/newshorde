<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>NewsHorde</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">NewsHorde</div>
      <div class="tagline">“I don't wanna know unless it's gonna kill me”</div>
      <div class="statusbar">
        <span class="meta" id="meta">checking…</span>
        <span class="controls">
          <button class="pill" id="toggle" hidden>Show read</button>
          <button class="pill" id="markall" hidden>Mark all read</button>
        </span>
      </div>
    </header>
    <main id="feed"><!-- rendered by app.js --></main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
