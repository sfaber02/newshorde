<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙈</text></svg>" />
  <title>NewsHorde</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <section id="weather"><!-- headline blob rendered by app.js --></section>
    <main id="feed"><!-- rendered by app.js --></main>

    <footer class="foot">
      <div class="brand">NewsHorde</div>
      <div class="tagline">“I don't wanna know unless it's gonna kill me”</div>
      <div class="statusbar">
        <span class="meta" id="meta">checking…</span>
        <span class="controls">
          <button class="pill" id="loc">📍 Location</button>
          <button class="pill" id="toggle" hidden>Show read</button>
          <button class="pill" id="markall" hidden>Mark all read</button>
        </span>
      </div>
    </footer>
  </div>

  <!-- location modal -->
  <div class="modal" id="locModal" hidden>
    <div class="modal-card">
      <h3>Your location</h3>
      <p class="modal-sub">For your local forecast &amp; weather alerts. Stored only in this browser.</p>
      <button class="btn" id="locGeo">📍 Use my current location</button>
      <div class="or">or</div>
      <label for="locInput">City, state or ZIP</label>
      <input id="locInput" placeholder="e.g. Portland, OR or 97201" autocomplete="off" />
      <div class="modal-err" id="locErr"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="locClear">Clear</button>
        <button class="btn ghost" id="locCancel">Cancel</button>
        <button class="btn" id="locSave">Save</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
